<div class="w-full h-full flex flex-col items-center px-6">

    <h1 class="w-full text-2xl font-extrabold mt-9 mb-4 text-center text-white">{{proyect()?.title}}</h1>

    <div class="w-full flex items-center">
      <div class="w-full flex flex-col justify-center items-center gap-4">
        <!-- Description -->
        <div class="w-full h-[15vh] p-4 flex justify-center items-center rounded-xl bg-black/40 backdrop-blur-md text-white">
          {{proyect()?.description}}
        </div>
        <!-- description -->

        <!-- Carateristicas -->
        <div class="w-full h-full py-4 px-2 flex flex-col rounded-xl bg-black/50 backdrop-blur-md">

          <h2 class="text-xl w-full text-center text-white"> <b>Funcionalidades</b> &#9881; </h2>

          <div #swiperContainer class="swiper relative w-full max-w-3xl mx-auto h-[20vh]">
            <div class="swiper-wrapper mt-5">
              @for (carac of proyect()?.caracteristics; track $index) {
              <div class="swiper-slide p-4">
                <ul class="list-disc list-inside flex flex-col justify-center gap-1 h-[70%] w-[80%] ml-45">
                  @for (frase of carac.caracteristic; track $index) {
                  <li>
                    <p class="inline text-white">{{frase}}</p>
                  </li>
                  }
                </ul>
              </div>
              }
            </div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
          </div>

        </div>
        <!-- carateristicas -->

      </div>
    </div>

    <div class="h-full flex justify-center items-center gap-3">
      @for (tec of proyect()?.tecnologies; track $index) {
      <div class="mx-2 w-20 h-21 flex flex-col justify-end items-center rounded-lg shadow-md p-4 bg-black/40 backdrop-blur-md">
        <div class="h-[90%] w-full flex justify-center items-center">
          <img [src]="tec.img" alt="" class="max-w-9 brightness-125">
        </div>
        <h3 class="text-xs text-center mt-1 text-white">{{tec.name}}</h3>
      </div>
      }
    </div>

</div>
